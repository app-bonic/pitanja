<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postavi pitanje predavaču</title>
    <style>
        /* Stilovi forme */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input, textarea, button {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <form id="questionForm">
            <h2>Postavi pitanje predavaču</h2>
            <label for="name">Ime:</label>
            <input type="text" id="name" name="name" required>

            <label for="question">Pitanje:</label>
            <textarea id="question" name="question" required></textarea>

            <button type="submit">Pošalji</button>
        </form>
        <p id="statusMessage"></p>
    </div>

    <script>
        document.getElementById('questionForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            var name = document.getElementById('name').value;
            var question = document.getElementById('question').value;

            // Slanje podataka putem fetch sa `no-cors`
            try {
                await fetch('https://script.google.com/macros/s/AKfycbwutWRk65IufdHHp3JOXPa9YA2YdgMZD88yxKAxd7P6LqRjtP6jkVqxNAO9VWoqHJ-6RA/exec', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    mode: 'no-cors', // Rješenje za CORS
                    body: JSON.stringify({ name: name, question: question })
                });

                document.getElementById('statusMessage').textContent = "Pitanje je uspješno poslano!";
                document.getElementById('statusMessage').style.color = "green";
            } catch (error) {
                document.getElementById('statusMessage').textContent = "Došlo je do pogreške prilikom slanja!";
                document.getElementById('statusMessage').style.color = "red";
                console.error('Greška:', error);
            }
        });
    </script>
</body>
</html>
